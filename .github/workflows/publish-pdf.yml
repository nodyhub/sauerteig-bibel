name: HTML to PDF Publisher

on:
  push:
    branches: [main]
    paths: ['content_dump.txt']

permissions:
  contents: write

jobs:
  convert-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install markdown playwright
          playwright install chromium

      - name: Build HTML
        id: prep
        run: python build_book.py

      - name: Convert HTML to PDF (Chrome)
        run: |
          # Ein winziges Inline-Script zum Drucken
          python -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto('file://${{ github.workspace }}/sauerteig_bibel.html')
              page.pdf(path='Sauerteig-Bibel.pdf', format='A4', print_background=True)
              browser.close()
          "

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.prep.outputs.VERSION }}
          name: "Sauerteig-Bibel v${{ steps.prep.outputs.VERSION }}"
          files: Sauerteig-Bibel.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}