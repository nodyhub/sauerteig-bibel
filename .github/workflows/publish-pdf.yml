name: PDF Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'content_dump.txt'
      - 'build_book.py'
      - '.github/workflows/publish-pdf.yml'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Extract Version & Build Markdown
        id: prep
        run: python build_book.py

      # FIX: Wir nutzen eine feste Version (v2.0.0), da der master-Link 404 wirft
      - name: Download Eisvogel Template
        run: |
          wget https://raw.githubusercontent.com/Wandmalfarbe/pandoc-latex-template/v2.0.0/eisvogel.tex

      - name: Convert to PDF
        uses: docker://pandoc/extra:3.1
        with:
          args: >-
            --output=Sauerteig-Bibel.pdf
            --template=eisvogel.tex
            --listings
            --pdf-engine=xelatex
            --variable geometry:margin=2.5cm
            --variable fontsize=11pt
            --variable titlepage=true
            --variable book=true
            --variable toc-own-page=true
            --top-level-division=chapter
            sauerteig_book.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.prep.outputs.VERSION }}
          name: "Sauerteig-Bibel v${{ steps.prep.outputs.VERSION }}"
          body: "Automatisch generiertes PDF der Version ${{ steps.prep.outputs.VERSION }} mit Eisvogel-Design."
          files: Sauerteig-Bibel.pdf
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}