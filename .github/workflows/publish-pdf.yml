name: HTML to PDF Publisher

on:
  push:
    branches: [main]
    paths: ['content_dump.txt']
  # NEU: Manueller Trigger hinzugefügt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install markdown playwright
          playwright install chromium

      - name: Build HTML
        id: prep
        run: python build_book.py

      - name: Convert HTML to PDF (Chrome)
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import os
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              # Pfad zum generierten HTML
              path = 'file://' + os.getcwd() + '/sauerteig_bibel.html'
              page.goto(path)
              # PDF Drucken mit Hintergrundfarben (für das Cover)
              page.pdf(
                  path='Sauerteig-Bibel.pdf', 
                  format='A4', 
                  print_background=True,
                  margin={'top': '0px', 'right': '0px', 'bottom': '0px', 'left': '0px'}
              )
              browser.close()
          "

      # Optional: PDF als Artifact speichern (zum direkten Download in der Action)
      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sauerteig-Bibel-PDF
          path: Sauerteig-Bibel.pdf

      - name: Create Release
        # Nur einen Release erstellen, wenn wir auf dem main branch sind (nicht bei Tests)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.prep.outputs.VERSION }}
          name: "Sauerteig-Bibel v${{ steps.prep.outputs.VERSION }}"
          files: Sauerteig-Bibel.pdf
          body: "Manuell oder automatisch generierte PDF-Version ${{ steps.prep.outputs.VERSION }}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}