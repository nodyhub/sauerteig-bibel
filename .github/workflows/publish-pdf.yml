name: HTML to PDF Publisher

on:
  push:
    branches: [main]
    paths: ['content_dump.txt', 'build_book.py']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install markdown playwright
          playwright install chromium

      - name: Build HTML
        id: prep
        run: python build_book.py

      - name: Convert HTML to PDF (Chrome)
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import os
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              path = 'file://' + os.getcwd() + '/sauerteig_bibel.html'
              page.goto(path, wait_until='networkidle')
              page.pdf(
                  path='Sauerteig-Bibel.pdf', 
                  format='A4', 
                  print_background=True,
                  margin={'top': '0', 'right': '0', 'bottom': '0', 'left': '0'}
              )
              browser.close()
          "

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.prep.outputs.VERSION }}
          name: "Sauerteig-Bibel v${{ steps.prep.outputs.VERSION }}"
          files: Sauerteig-Bibel.pdf
          body: "Automatisch generiertes PDF der Version ${{ steps.prep.outputs.VERSION }}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}